spring:
  application:
    name: comprapro-backend

  # =============================================
  # BASE DE DATOS
  # - LOCAL: usa H2 embebido (sin configurar nada)
  # - RENDER: define la variable de entorno DATABASE_URL
  #   con el valor "Internal Database URL" de Render
  # =============================================
  datasource:
    url: ${DATABASE_URL:jdbc:h2:mem:compraprodb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE}
    driver-class-name: ${DATABASE_DRIVER:org.h2.Driver}
    username: ${DATABASE_USERNAME:sa}
    password: ${DATABASE_PASSWORD:}

  h2:
    console:
      enabled: true
      path: /h2-console

  jpa:
    hibernate:
      ddl-auto: ${DDL_AUTO:create-drop}
    show-sql: false
    properties:
      hibernate:
        dialect: ${HIBERNATE_DIALECT:org.hibernate.dialect.H2Dialect}
        format_sql: false

server:
  port: ${PORT:8080}

# JWT Configuration
jwt:
  secret: ${JWT_SECRET:comprapro-secret-key-very-long-and-secure-2024-spring-boot-jwt}
  expiration: 86400000  # 24 horas en milisegundos

# Logging
logging:
  level:
    com.comprapro: INFO
    org.springframework.security: WARN
